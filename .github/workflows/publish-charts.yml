name: Publish Helm Charts

on:
  workflow_dispatch:
    inputs:
      charts:
        description: 'Charts to publish (comma-separated, e.g. "common", "kafka", "postgresql-ha")'
        required: true
      dry_run:
        description: 'Dry run - package only, skip push'
        required: false
        type: boolean
        default: false

# on:
#   push:
#     branches: [main]
#     paths:
#       - 'soldevelo/*/Chart.yaml'

jobs:
  publish:
    name: Package & push charts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Determine charts to publish
        id: charts
        run: |
          CHARTS=""
          IFS=',' read -ra REQUESTED <<< "${{ inputs.charts }}"
          for name in "${REQUESTED[@]}"; do
            name=$(echo "$name" | xargs)   # trim whitespace
            dir="soldevelo/$name"
            if [ -d "$dir" ]; then
              CHARTS="$CHARTS $dir"
            else
              echo "::error::Chart directory '$dir' not found."
              exit 1
            fi
          done
          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"
          echo "Publishing:$CHARTS"

      - name: Package charts
        run: |
          mkdir -p _dist
          for chart in ${{ steps.charts.outputs.charts }}; do
            echo "=== Packaging $chart ==="
            if [ -f "$chart/Chart.lock" ]; then
              helm dependency update "$chart"
            fi
            helm package "$chart" --destination _dist/
          done
          ls -lh _dist/

      - name: Login to Docker Hub
        if: ${{ !inputs.dry_run }}
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            helm registry login registry-1.docker.io \
              --username "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

      - name: Push charts to Docker Hub OCI registry
        if: ${{ !inputs.dry_run }}
        run: |
          for tgz in _dist/*.tgz; do
            echo "=== Pushing $tgz ==="
            helm push "$tgz" oci://registry-1.docker.io/soldevelo
          done

      - name: Upload packaged charts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          path: _dist/*.tgz
          retention-days: 7
